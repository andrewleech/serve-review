name: Release

on:
  push:
    tags:
      - 'v*'

# OIDC trusted publishing: PyPI is configured to accept uploads signed by
# this workflow's identity, so no API token is stored as a repo secret.
# Configure once at https://pypi.org/manage/account/publishing/ with:
#   PyPI Project Name: serve-review
#   Owner:             andrewleech
#   Repository name:   serve-review
#   Workflow name:     release.yml
#   Environment name:  release

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      # Re-run the same checks CI runs on main; a release that fails the
      # gates that protect main has no business being on PyPI.
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run mypy src/
      - run: uv run pytest -v
      - name: Verify tag matches pyproject version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version=$(uv run python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject version $pkg_version"
            exit 1
          fi
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
